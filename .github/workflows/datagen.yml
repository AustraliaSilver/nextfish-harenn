name: HARENN Continuous Data Generation

on:
  push:
    branches:
      - data
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  data-generation:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      matrix:
        # Chạy 5 máy ảo cùng lúc (x5 tốc độ)
        worker_id: [1, 2, 3, 4, 5]
      fail-fast: false
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: data

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install python-chess numpy

      - name: Download Stockfish 18
        run: |
          curl -L -o stockfish.tar https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-avx2.tar
          tar -xvf stockfish.tar
          mv stockfish/stockfish-ubuntu-x86-64-avx2 ./harenn_engine
          chmod +x harenn_engine
          chmod +x parallel_generate.py

      - name: Generate Data (4 Hours Continuous)
        run: |
          mkdir -p data
          # Sử dụng thêm matrix.worker_id để tạo sự khác biệt giữa các máy
          python3 parallel_generate.py --engine ./harenn_engine --output ./data --timeout 14400 --concurrency 2

      - name: Commit and Push Data
        run: |
          git config --global user.name "HARENN Data Bot ${{ matrix.worker_id }}"
          git config --global user.email "harenn-bot-${{ matrix.worker_id }}@users.noreply.github.com"
          git config advice.addIgnoredFile false
          
          # Vòng lặp thử lại (Retry Loop) để tránh xung đột khi 5 máy cùng push một lúc
          for i in {1..10}; do
            git add -f data/
            timestamp=$(date +%Y%m%d_%H%M%S)
            git commit -m "Add HARENN training data (Worker ${{ matrix.worker_id }}) $timestamp" || exit 0
            git pull --rebase origin data
            git push origin data && break || sleep 30
          done
