name: HARENN Continuous Data Generation

on:
  push:
    branches:
      - data
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  data-generation:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      matrix:
        worker_id: [1, 2, 3, 4, 5]
      fail-fast: false
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: data

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install python-chess numpy

      - name: Download Stockfish 18
        run: |
          curl -L -o stockfish.tar https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-avx2.tar
          tar -xvf stockfish.tar
          mv stockfish/stockfish-ubuntu-x86-64-avx2 ./harenn_engine
          chmod +x harenn_engine
          chmod +x parallel_generate.py

      - name: Generate Data (4 Hours Continuous)
        run: |
          mkdir -p data
          python3 parallel_generate.py --engine ./harenn_engine --output ./data --timeout 14400 --concurrency 2

      - name: Commit and Push Data
        run: |
          git config --global user.name "HARENN Data Bot ${{ matrix.worker_id }}"
          git config --global user.email "harenn-bot-${{ matrix.worker_id }}@users.noreply.github.com"
          git config advice.addIgnoredFile false
          
          # Đảm bảo các tệp engine không làm phiền Git
          echo "harenn_engine" >> .gitignore
          echo "stockfish.tar" >> .gitignore
          echo "stockfish/" >> .gitignore
          
          for i in {1..20}; do
            # Chỉ add các file json trong data
            git add -f data/*.json
            timestamp=$(date +%Y%m%d_%H%M%S)
            
            # Commit nếu có thay đổi
            if git commit -m "Add HARENN training data (Worker ${{ matrix.worker_id }}) $timestamp"; then
              # Nếu commit thành công, cố gắng pull và push
              # Dùng --autostash để tự động cất các tệp rác và lấy lại sau khi rebase
              if git pull --rebase --autostash origin data; then
                if git push origin data; then
                  echo "Push successful!"
                  break
                fi
              fi
            else
              echo "No changes to commit or commit failed"
              break
            fi
            echo "Conflict or race condition detected, retrying in 30s... (Attempt $i)"
            sleep 30
          done
