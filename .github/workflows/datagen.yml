name: HARENN Continuous Data Generation

on:
  push:
    branches:
      - data
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  data-generation:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: data

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install python-chess numpy

      - name: Download Stockfish 18
        run: |
          curl -L -o stockfish.tar https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-avx2.tar
          tar -xvf stockfish.tar
          # The tar usually extracts to a directory named stockfish/
          mv stockfish/stockfish-ubuntu-x86-64-avx2 ./harenn_engine
          chmod +x harenn_engine
          chmod +x parallel_generate.py

      - name: Generate Data (4 Hours Continuous)
        run: |
          mkdir -p data
          python3 parallel_generate.py --engine ./harenn_engine --output ./data --timeout 14400 --concurrency 2

      - name: Commit and Push Data
        run: |
          git config --global user.name "HARENN Data Bot"
          git config --global user.email "harenn-bot@users.noreply.github.com"
          git config advice.addIgnoredFile false
          git add -f data/
          timestamp=$(date +%Y%m%d_%H%M%S)
          git commit -m "Add HARENN training data $timestamp" || echo "No changes to commit"
          git push origin data