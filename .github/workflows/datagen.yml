name: HARENN Continuous Data Generation

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */5 * * *' # Every 5 hours
  workflow_dispatch:

jobs:
  data-generation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make python3-pip
          pip install python-chess numpy

      - name: Build HARENN Engine
        run: |
          cd src
          curl -L -O https://tests.stockfishchess.org/api/nn/nn-3dd094f3dfcf.nnue
          curl -L -O https://tests.stockfishchess.org/api/nn/nn-37f18f62d772.nnue
          
          # Fix possible ambiguity in search.cpp by using explicit namespace
          sed -i 's/HARENN::GuidanceProvider/Stockfish::HARENN::GuidanceProvider/g' search.cpp
          sed -i 's/HARENN::EvalResult/Stockfish::HARENN::EvalResult/g' search.cpp
          sed -i 's/DEE::Evaluator/Stockfish::DEE::Evaluator/g' search.cpp
          sed -i 's/HARENN::GuidanceProvider/Stockfish::HARENN::GuidanceProvider/g' main.cpp
          
          # Use modern ARCH name
          make ARCH=x86-64-sse41-popcnt all -j$(nproc)
          mv stockfish ../harenn_engine
          cd ..
          chmod +x harenn_engine
          chmod +x generate_training_data.py

      - name: Generate Data (5 Hours)
        run: |
          mkdir -p data
          echo "Starting data generation for 5 hours..."
          
          python3 <<EOF
          import subprocess
          import time
          import os
          import sys
          
          start_time = time.time()
          timeout = 18000 # 5 hours
          
          try:
              while time.time() - start_time < timeout:
                  print(f"Running batch at {time.time() - start_time:.0f}s")
                  if not os.path.exists("openings.epd"):
                      with open("openings.epd", "w") as f:
                          f.write("rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1\n")
                  
                  # Run generation with memory limits
                  result = subprocess.run([
                      "python3", "generate_training_data.py",
                      "--engine", "./harenn_engine",
                      "--games", "50",
                      "--output", "./data",
                      "--epd", "openings.epd"
                  ], capture_output=True, text=True)
                  
                  if result.stdout:
                      print(result.stdout)
                  if "Error" in result.stderr:
                      print(f"Engine/Script Alert: {result.stderr}", file=sys.stderr)
                      
                  if time.time() - start_time > timeout - 600:
                      break
          except Exception as e:
              print(f"Python wrapper error: {e}")
              sys.exit(1)
          EOF

      - name: Commit and Push Data
        run: |
          git config --global user.name "HARENN Data Bot"
          git config --global user.email "harenn-bot@users.noreply.github.com"
          
          # Force checkout or create data branch
          git fetch origin data || true
          git checkout data || git checkout -b data
          
          # Merge main changes if needed to keep build scripts up to date
          git merge main -m "Merge main into data [skip ci]" || true
          
          git add -f data/*.jsonl
          timestamp=$(date +%Y%m%d_%H%M%S)
          git commit -m "Add HARENN training data $timestamp [skip ci]" || echo "No changes to commit"
          git push origin data
