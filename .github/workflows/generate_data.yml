name: HARENN Dataset Generation

on:
  workflow_dispatch:
    inputs:
      games:
        description: "Total self-play games"
        required: false
        default: "120"
      workers:
        description: "Parallel generator workers"
        required: false
        default: "2"
      book_plies:
        description: "Opening plies to keep"
        required: false
        default: "8"
      stockfish_release:
        description: "Stockfish release tag"
        required: false
        default: "sf_18"
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      GAMES: ${{ github.event.inputs.games || '120' }}
      WORKERS: ${{ github.event.inputs.workers || '2' }}
      BOOK_PLIES: ${{ github.event.inputs.book_plies || '8' }}
      SF_TAG: ${{ github.event.inputs.stockfish_release || 'sf_18' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install python-chess zstandard

      - name: Download Stockfish release
        run: |
          set -euxo pipefail
          curl -L -o stockfish.tar "https://github.com/official-stockfish/Stockfish/releases/download/${SF_TAG}/stockfish-ubuntu-x86-64-avx2.tar"
          tar -xvf stockfish.tar
          mv stockfish/stockfish-ubuntu-x86-64-avx2 ./stockfish
          chmod +x ./stockfish

      - name: Build HARENN generator
        run: |
          set -euxo pipefail
          g++ -O3 -std=c++17 harenn_gen.cpp -o harenn_gen -lpthread

      - name: Generate opening seeds
        run: |
          python preprocess_pgn.py \
            --input UHO_2022_8mvs_+110_+119.pgn \
            --output book_moves.txt \
            --lines 8000 \
            --plies "${BOOK_PLIES}" \
            --seed 20260224

      - name: Run dataset orchestrator
        run: |
          python scripts/generate_dataset.py \
            --repo-root . \
            --generator ./harenn_gen \
            --stockfish ./stockfish \
            --games "${GAMES}" \
            --workers "${WORKERS}" \
            --book-input UHO_2022_8mvs_+110_+119.pgn \
            --book-lines 8000 \
            --book-plies "${BOOK_PLIES}" \
            --out-dir data/generated \
            --prefix harenn

      - name: List generated files
        run: |
          ls -lah data/generated

      - name: Upload dataset artifacts
        uses: actions/upload-artifact@v4
        with:
          name: harenn-dataset-${{ github.run_id }}
          path: data/generated/*
          if-no-files-found: error
          retention-days: 14
